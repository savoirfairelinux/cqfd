name: Arch Linux Packaging
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        pacman -Sy --noconfirm asciidoctor bash-completion docker git namcap shellcheck
    - name: Build package
      run: |
        ver="$(bash ${{ github.event.repository.name }} --version)"
        tar czf "../${{ github.event.repository.name }}-$ver.tar.gz" --transform "s/./${{ github.event.repository.name }}-$ver/" .
        mv "../${{ github.event.repository.name }}-$ver.tar.gz" .
        chown -R nobody .
        runuser -u nobody -- makepkg --force --skipchecksums
    - name: Lint package
      run: |
        runuser -u nobody -- namcap PKGBUILD PKGBUILD-git ${{ github.event.repository.name }}*.pkg.tar*
    - name: Archive package
      uses: actions/upload-artifact@v4
      with:
        path: |
          *.pkg.tar*
    - name: Create release
      uses: softprops/action-gh-release@v2
      if: github.ref_type == 'tag'
      with:
        files: |
          *.pkg.tar*
